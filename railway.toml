[build]
builder = "nixpacks"

[deploy]
startCommand = "gunicorn api.flask_app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "web"
startCommand = "gunicorn api.flask_app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120"

[[services]]
name = "worker"
startCommand = "python services/alerts_engine.py"
