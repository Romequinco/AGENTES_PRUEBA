name: IBEX 35 — Informe Diario

on:
  schedule:
    # Dos entradas para garantizar las 18:30 Madrid todo el año:
    - cron: '30 16 * * 1-5'  # verano  (UTC+2, mar–oct): 18:30 Madrid
    - cron: '30 17 * * 1-5'  # invierno (UTC+1, oct–mar): 18:30 Madrid
    # Ambas se disparan siempre; main.py sale sin hacer nada si el informe ya existe hoy
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Forzar ejecución ignorando horario'
        required: false
        default: 'true'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 obligatorio desde junio 2026

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar informe IBEX 35
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
        run: python main.py

      - name: Subir informe PDF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: informe-ibex35-${{ github.run_id }}
          path: output/informe_*.pdf
          retention-days: 30
          if-no-files-found: ignore

      - name: Subir logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-ibex35-${{ github.run_id }}
          path: logs/run_*.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Enviar informe por email
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'EOF'
          import os, smtplib, glob
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.application import MIMEApplication
          from datetime import date

          GMAIL_USER = os.environ["GMAIL_USER"]
          GMAIL_PASS = os.environ["GMAIL_APP_PASSWORD"]
          DEST       = "romequinco@gmail.com"

          fecha_hoy     = date.today().strftime("%Y-%m-%d")
          fecha_display = date.today().strftime("%d/%m/%Y")

          # Solo adjuntar el PDF si es del día de hoy
          pdf_hoy  = f"output/informe_{fecha_hoy}.pdf"
          pdf_path = pdf_hoy if os.path.exists(pdf_hoy) else None

          if pdf_path:
              asunto = f"IBEX 35 — Informe Diario {fecha_display}"
              cuerpo = f"""\
          Hola,

          Adjunto encontrarás el informe automático del IBEX 35 correspondiente a la sesión del {fecha_display}.

          El informe incluye:
          • Resumen ejecutivo y titular de portada
          • Mapa de calor por capitalización bursátil
          • Análisis sectorial y mejores/peores valores
          • Noticias con impacto en el mercado
          • Puntos de vigilancia para los próximos días

          Este mensaje ha sido generado automáticamente.
          """
          else:
              asunto = f"⚠️ IBEX 35 — Informe NO generado {fecha_display}"
              cuerpo = f"""\
          Hola,

          El informe del IBEX 35 correspondiente a la sesión del {fecha_display} NO ha sido generado.

          Posibles causas:
          • El pipeline se ejecutó fuera del horario de mercado (17:35–19:00 Madrid)
          • Error en alguno de los agentes (Recopilador, Analista o Redactor)
          • Fallo en la conexión con la API de Anthropic o yfinance

          Revisa los logs del workflow en GitHub Actions para más detalles.

          Este mensaje ha sido generado automáticamente.
          """

          msg = MIMEMultipart()
          msg["From"]    = GMAIL_USER
          msg["To"]      = DEST
          msg["Subject"] = asunto
          msg.attach(MIMEText(cuerpo, "plain", "utf-8"))

          if pdf_path:
              with open(pdf_path, "rb") as f:
                  part = MIMEApplication(f.read(), Name=os.path.basename(pdf_path))
              part["Content-Disposition"] = f'attachment; filename="{os.path.basename(pdf_path)}"'
              msg.attach(part)

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(GMAIL_USER, GMAIL_PASS)
              smtp.sendmail(GMAIL_USER, DEST, msg.as_string())

          print(f"Email enviado a {DEST}" + (f" con {os.path.basename(pdf_path)}" if pdf_path else " — AVISO de fallo (sin PDF)"))
          EOF
